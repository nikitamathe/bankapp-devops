server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:5173"   # Vite local dev
              - "http://localhost:80"     # Docker frontend
              - "http://localhost"        # Docker frontend (no port)
            allowedMethods: [GET, POST, PUT, PATCH, DELETE, OPTIONS]
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600
      routes:
        - id: auth-service
          uri: http://${AUTH_SERVICE_HOST:localhost}:${AUTH_SERVICE_PORT:8081}
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=0

        - id: account-service
          uri: http://${ACCOUNT_SERVICE_HOST:localhost}:${ACCOUNT_SERVICE_PORT:8082}
          predicates:
            - Path=/api/accounts/**
          filters:
            - StripPrefix=0
            - AuthFilter

        - id: transaction-service
          uri: http://${TRANSACTION_SERVICE_HOST:localhost}:${TRANSACTION_SERVICE_PORT:8083}
          predicates:
            - Path=/api/transactions/**
          filters:
            - StripPrefix=0
            - AuthFilter

        - id: notification-service
          uri: http://${NOTIFICATION_SERVICE_HOST:localhost}:${NOTIFICATION_SERVICE_PORT:8084}
          predicates:
            - Path=/api/notifications/**
          filters:
            - StripPrefix=0
            - AuthFilter

jwt:
  secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}

logging:
  level:
    com.banking: INFO
    org.springframework.cloud.gateway: INFO
