server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:5173"   # Vite dev server
              - "http://localhost:3000"   # Alternative React port
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600
      routes:
        # Auth Service — public (no JWT filter on /auth/**)
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=0

        # Account Service — protected
        - id: account-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/accounts/**
          filters:
            - StripPrefix=0
            - AuthFilter

        # Transaction Service — protected
        - id: transaction-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/transactions/**
          filters:
            - StripPrefix=0
            - AuthFilter

        # Notification Service — protected (user-facing endpoints)
        - id: notification-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/notifications/**
          filters:
            - StripPrefix=0
            - AuthFilter

