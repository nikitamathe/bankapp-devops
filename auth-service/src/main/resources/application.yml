server:
  port: 8081

spring:
  application:
    name: auth-service
  datasource:
    # Docker: use 'mysql' service name. Local dev: override via env var or profile.
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/banking_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USER:root}
    password: ${DB_PASS:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: false

jwt:
  secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
  expiration: 86400000       # 24 h
  refresh-expiration: 604800000  # 7 days

logging:
  level:
    com.banking: INFO
