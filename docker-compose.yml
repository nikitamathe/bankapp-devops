version: "3.9"

# ─── Shared environment variables ────────────────────────────────────────────
x-db-env: &db-env
  DB_HOST: mysql
  DB_PORT: 3306
  DB_USER: root
  DB_PASS: root

x-jwt-env: &jwt-env
  JWT_SECRET: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970

x-service-hosts: &service-hosts
  AUTH_SERVICE_HOST: auth-service
  AUTH_SERVICE_PORT: 8081
  ACCOUNT_SERVICE_HOST: account-service
  ACCOUNT_SERVICE_PORT: 8082
  TRANSACTION_SERVICE_HOST: transaction-service
  TRANSACTION_SERVICE_PORT: 8083
  NOTIFICATION_SERVICE_HOST: notification-service
  NOTIFICATION_SERVICE_PORT: 8084

# ─── Healthcheck defaults ─────────────────────────────────────────────────────
x-healthcheck-defaults: &hc-defaults
  interval: 15s
  timeout: 5s
  retries: 5
  start_period: 60s

services:

  # ── MySQL ──────────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: banking-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: banking_db
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - banking-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      <<: *hc-defaults

  # ── Auth Service ───────────────────────────────────────────────────────────
  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: banking-auth
    restart: unless-stopped
    environment:
      <<: [*db-env, *jwt-env]
    ports:
      - "8081:8081"
    networks:
      - banking-net
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health | grep -q UP"]
      <<: *hc-defaults

  # ── Account Service ────────────────────────────────────────────────────────
  account-service:
    build:
      context: ./account-service
      dockerfile: Dockerfile
    container_name: banking-account
    restart: unless-stopped
    environment:
      <<: [*db-env, *jwt-env]
      NOTIFICATION_SERVICE_HOST: notification-service
      NOTIFICATION_SERVICE_PORT: 8084
    ports:
      - "8082:8082"
    networks:
      - banking-net
    depends_on:
      mysql:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/actuator/health | grep -q UP"]
      <<: *hc-defaults

  # ── Transaction Service ────────────────────────────────────────────────────
  transaction-service:
    build:
      context: ./transaction-service
      dockerfile: Dockerfile
    container_name: banking-transaction
    restart: unless-stopped
    environment:
      <<: [*db-env, *jwt-env]
      ACCOUNT_SERVICE_HOST: account-service
      ACCOUNT_SERVICE_PORT: 8082
      NOTIFICATION_SERVICE_HOST: notification-service
      NOTIFICATION_SERVICE_PORT: 8084
    ports:
      - "8083:8083"
    networks:
      - banking-net
    depends_on:
      mysql:
        condition: service_healthy
      account-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8083/actuator/health | grep -q UP"]
      <<: *hc-defaults

  # ── Notification Service ───────────────────────────────────────────────────
  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: banking-notification
    restart: unless-stopped
    environment:
      <<: [*db-env]
    ports:
      - "8084:8084"
    networks:
      - banking-net
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8084/actuator/health | grep -q UP"]
      <<: *hc-defaults

  # ── API Gateway ────────────────────────────────────────────────────────────
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: banking-gateway
    restart: unless-stopped
    environment:
      <<: [*jwt-env, *service-hosts]
    ports:
      - "8080:8080"
    networks:
      - banking-net
    depends_on:
      auth-service:
        condition: service_healthy
      account-service:
        condition: service_healthy
      transaction-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q UP"]
      <<: *hc-defaults

  # ── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: banking-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    networks:
      - banking-net
    depends_on:
      api-gateway:
        condition: service_healthy

# ─── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  mysql-data:
    driver: local

# ─── Networks ─────────────────────────────────────────────────────────────────
networks:
  banking-net:
    driver: bridge
